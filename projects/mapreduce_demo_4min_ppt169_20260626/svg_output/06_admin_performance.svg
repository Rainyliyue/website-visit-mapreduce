<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#F3F6FA"/>
  <text x="56" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="700" fill="#152033">管理员功能与性能优化</text>
  <text x="56" y="118" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#667085">管理员验收四项功能，并说明较大样例下的运行优化</text>
  <rect x="56" y="154" width="546" height="452" rx="14" fill="#FFFFFF"/>
  <text x="88" y="200" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#152033">管理员控制台</text>
  <rect x="88" y="232" width="220" height="84" rx="12" fill="#E8F3F1"/>
  <text x="114" y="266" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#0F766E">用户管理</text>
  <text x="114" y="294" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#667085">查看账号和角色</text>
  <rect x="338" y="232" width="220" height="84" rx="12" fill="#E8F1F8"/>
  <text x="364" y="266" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#155E75">任务管理</text>
  <text x="364" y="294" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#667085">删除完成或异常任务</text>
  <rect x="88" y="346" width="220" height="84" rx="12" fill="#FFF1E8"/>
  <text x="114" y="380" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#F97316">数据管理</text>
  <text x="114" y="408" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#667085">删除统计结果和明细</text>
  <rect x="338" y="346" width="220" height="84" rx="12" fill="#F7FAFC"/>
  <text x="364" y="380" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#152033">缓存管理</text>
  <text x="364" y="408" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#667085">清理已完成任务缓存</text>
  <line x1="88" y1="468" x2="558" y2="468" stroke="#D9E2EC" stroke-width="2"/>
  <text x="88" y="506" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" fill="#152033">管理员账号：admin / admin123</text>
  <text x="88" y="540" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#667085">现场操作：退出普通用户，登录 admin，进入控制台</text>
  <rect x="650" y="154" width="574" height="452" rx="14" fill="#FFFFFF"/>
  <text x="682" y="200" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#152033">性能优化点</text>
  <rect x="682" y="235" width="486" height="74" rx="12" fill="#E8F3F1"/>
  <text x="712" y="268" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#0F766E">异步执行任务</text>
  <text x="712" y="294" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#667085">提交后页面不阻塞，任务列表轮询状态</text>
  <rect x="682" y="330" width="486" height="74" rx="12" fill="#E8F1F8"/>
  <text x="712" y="363" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#155E75">批量写入数据库</text>
  <text x="712" y="389" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#667085">统计结果和访问明细按批次落库，减少 SQL 往返</text>
  <rect x="682" y="425" width="486" height="74" rx="12" fill="#FFF1E8"/>
  <text x="712" y="458" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#F97316">按分析类型执行</text>
  <text x="712" y="484" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#667085">只运行当前需要的统计方向，降低大样例耗时</text>
  <rect x="682" y="520" width="486" height="50" rx="12" fill="#F7FAFC"/>
  <text x="712" y="552" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="700" fill="#152033">适合演示：中等样例更稳，大规模样例用于说明容量</text>
  <text x="56" y="660" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#667085">06 / 07</text>
</svg>
