<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#F3F6FA" />
  <text x="56" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="700" fill="#152033">MapReduce 核心算法</text>
  <text x="56" y="118" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#667085">同一份日志解析，不同统计 key，统一 Reducer 求和</text>
  <path fill="#FFFFFF" d="M70,154 H1210 A14,14 0 0 1 1224,168 V234 A14,14 0 0 1 1210,248 H70 A14,14 0 0 1 56,234 V168 A14,14 0 0 1 70,154 Z" />
  <text x="86" y="192" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#152033">共享基础</text>
  <text x="230" y="192" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" fill="#667085">AccessLogRecord 解析 CSV 行，过滤表头和异常行</text>
  <text x="230" y="224" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" fill="#667085">SumReducer 对相同 key 的 value=1 做累加，输出统计结果</text>
  <path fill="#FFFFFF" d="M70,284 H398 A14,14 0 0 1 412,298 V556 A14,14 0 0 1 398,570 H70 A14,14 0 0 1 56,556 V298 A14,14 0 0 1 70,284 Z" />
