  <text x="898" y="374" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#152033">Mapper</text>
  <text x="898" y="407" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#667085">读取 site、region、ip</text>
  <text x="898" y="435" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#667085">输出 REGION 与 IP 两类 key</text>
  <line x1="898" y1="458" x2="1194" y2="458" stroke="#D9E2EC" stroke-width="2" />
